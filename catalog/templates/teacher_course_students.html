<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>修課學生名單</title>
    <style>
        body {
            font-family: "微軟正黑體";
            background: #f5f6fa;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,.06);
        }
        h1 {
            color: #4f46e5;
            margin-bottom: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #eef2ff;
        }
        .back {
            display: inline-block;
            margin-top: 20px;
            color: #4f46e5;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>{{ course.name }}｜修課學生名單</h1>

    {% if enrollments %}
    <table>
        <tr>
            <th>學號</th>
            <th>姓名</th>
        </tr>
        {% for e in enrollments %}
        <tr>
            <td>{{ e.student.student_id }}</td>
            <td>{{ e.student.name }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <p>目前尚無學生修課。</p>
    {% endif %}

    <a href="{% url 'teacher_dashboard' %}" class="back">← 回老師後台</a>
</div>
</body>
</html>
