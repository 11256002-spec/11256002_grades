<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>課程資訊</title>
  <style>
    body {
      background: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      margin: 0;
      padding: 40px 0;
    }
    .top-bar {
      background: #2563eb;
      color: #fff;
      padding: 14px 28px;
      font-size: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-btn {
      font-size: 13px;
      color: #fff;
      background: #ef4444;
      padding: 6px 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.15s ease;
    }
    .admin-btn:hover {
      background: #b91c1c;
    }
    .container {
      max-width: 960px;
      margin: 28px auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 24px 32px 32px;
    }
    h1.course-title {
      font-size: 28px;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 20px;
      text-align: left;
    }
    .info-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 15px;
      color: #374151;
    }
    h2 {
      font-size: 18px;
      margin-top: 20px;
      margin-bottom: 10px;
      color: #111827;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #f3f4f6;
      text-align: center;
      font-size: 14px;
    }
    th {
      background: #f9fafb;
      color: #6b7280;
      font-weight: 600;
    }
    tbody tr:hover {
      background: #f9fafb;
    }
    .empty {
      font-size: 14px;
      color: #9ca3af;
      text-align: center;
      margin-top: 10px;
    }
    .back-link {
      margin-top: 20px;
      font-size: 14px;
      text-align: right;
    }
    .back-link a {
      color: #2563eb;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <span>學生成績系統</span>
    {% if user.is_superuser %}
    <a href="/admin/" class="admin-btn">🔑 超級管理者</a>
    {% endif %}
  </div>

  <div class="container">
    <!-- 課程名稱 -->
    <h1 class="course-title">{{ course.name }}</h1>

    <!-- 課程代碼與授課老師 -->
    <div class="info-box">課程代碼：{{ course.code }}</div>
    <div class="info-box">授課老師：{{ course.teacher }}</div>

    <!-- 修課學生名單 -->
    <h2>修課學生名單</h2>
    {% if enrollments %}
      <table>
        <tr>
          <th>學生姓名</th>
          <th>學號</th>
        </tr>
        {% for e in enrollments %}
        <tr>
          <td>{{ e.student.name }}</td>
          <td>{{ e.student.student_id }}</td>
        </tr>
        {% endfor %}
      </table>
    {% else %}
      <div class="empty">目前尚無學生修課。</div>
    {% endif %}

    <!-- 返回連結 -->
    <div class="back-link">
      <a href="{% url 'student_dashboard' %}">← 回到成績總覽</a>
    </div>
  </div>
</body>
</html>
